version: 0.1 
component: build
timeoutInSeconds: 600
shell: bash

env:
  variables:
    JAVA_HOME: /usr/lib64/graalvm/graalvm-java22
    CONFIG_BUCKET: "reacttodo-0prww"
    BASE_DIR: "Spring-Boot/MtdrSpring/backend"

  exportedVariables:
    - BuildServiceDemoVersion

steps:
  - type: Command
    name: "Install GraalVM Enterprise 22.x Native Image for Java22"
    command:  yum -y install graalvm-22-jdk.x86_64;
              ls /usr/lib64/graalvm/

  - type: Command
    name: "Set PATH Variable"
    command: export PATH=$JAVA_HOME/bin:$PATH

  - type: Command
    name: "Download and Place Files"
    command: |
      # Aseguramos que existan las subcarpetas desde la raíz actual
      mkdir -p ${BASE_DIR}/src/main/resources

      oci os object get --bucket-name ${CONFIG_BUCKET} --name AppPropertiesapplication.properties --file ${BASE_DIR}/src/main/resources/application.properties

      oci os object get --bucket-name ${CONFIG_BUCKET} --name DockerfileDevDockerfileDev --file ${BASE_DIR}/Dockerfile

      oci os object get --bucket-name ${CONFIG_BUCKET} --name walletwallet.zip --file ${BASE_DIR}/wallet.zip
      unzip -o ${BASE_DIR}/wallet.zip -d ${BASE_DIR}

  - type: Command
    name: "Docker Login"
    command:  cd MtdrSpring;
              oci os object get --bucket-name reacttodo-xodhi --name deployment_config.tgz --file deployment_config.tgz;
              tar -xzvf deployment_config.tgz;
              source env.sh;
              cat at.cfg | docker login -u "axhaacddrwux/a00840313@tec.mx" --password-stdin mx-queretaro-1.ocir.io

  - type: Command
    name: "Build"
    command:  cd MtdrSpring;
              source env.sh;
              (cd backend;source build.sh)



